<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyPortal - Home</title>
    <link rel="stylesheet" href="../style/home/home.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-symbols" id="bgSymbols"></div>
    <div class="nav">
      <div class="nav-left">
        <a href="./home.html">
          <h1>StudyP<img src="../img/portal.png" alt="" />rtal</h1>
        </a>
      </div>
      <div class=
      "nav-right">
        <div class="ruby-balance" id="rubyBalance">
          <span>💎</span><span id="rubyCount">0</span>
        </div>
        <button class="burger-btn" id="burgerBtn" aria-label="Open menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="44"
            height="44"
            fill="currentColor"
            class="bi bi-list"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"
            />
          </svg>
        </button>
      </div>
    </div>

    <div class="nav-overlay" id="navOverlay"></div>
    <div class="nav-menu" id="navMenu">
      <button class="nav-menu__close" id="navClose" aria-label="Close menu">&times;</button>
      <a href="./accountManagement.html" class="nav-menu__profile" id="profileLink">
        <img src="" alt="" class="nav-menu__avatar" id="profileAvatar" />
        <span id="profileName">Profile</span>
      </a>
      <hr class="nav-menu__divider" />
      <nav>
        <a href="./dashboard.html" class="nav-menu__link">📊 Dashboard</a>
        <a href="#about" class="nav-menu__link">About</a>
        <a href="#contact" class="nav-menu__link">Contact</a>
        <a href="#settings" class="nav-menu__link">Settings</a>
      </nav>
    </div>

    <main class="grades">
      <div class="pentagon">
        <a href="./grades/subjects.html?grade=7" class="grade-btn">
          <span class="grade-btn__num">7th</span>
          <span class="grade-btn__label">Grade</span>
        </a>
        <a href="./grades/subjects.html?grade=8" class="grade-btn">
          <span class="grade-btn__num">8th</span>
          <span class="grade-btn__label">Grade</span>
        </a>
        <a href="./grades/subjects.html?grade=9" class="grade-btn">
          <span class="grade-btn__num">9th</span>
          <span class="grade-btn__label">Grade</span>
        </a>
        <a href="./grades/subjects.html?grade=10" class="grade-btn">
          <span class="grade-btn__num">10th</span>
          <span class="grade-btn__label">Grade</span>
        </a>
        <a href="./grades/subjects.html?grade=11" class="grade-btn">
          <span class="grade-btn__num">11th</span>
          <span class="grade-btn__label">Grade</span>
        </a>
        <img src="../img/portal.png" alt="StudyPortal" class="pentagon__center" />
      </div>
    </main>

    <script>
      const burgerBtn = document.getElementById('burgerBtn');
      const navMenu = document.getElementById('navMenu');
      const navOverlay = document.getElementById('navOverlay');
      const navClose = document.getElementById('navClose');

      function openMenu() {
        navMenu.classList.add('open');
        navOverlay.classList.add('open');
      }

      function closeMenu() {
        navMenu.classList.remove('open');
        navOverlay.classList.remove('open');
      }

      burgerBtn.addEventListener('click', openMenu);
      navClose.addEventListener('click', closeMenu);
      navOverlay.addEventListener('click', closeMenu);

      const username = sessionStorage.getItem('username');
      const token = sessionStorage.getItem('token');
      if (username && token) {
        document.getElementById('profileName').textContent = username;
        fetch(`/api/user/${username}`, { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(data => {
            if (data.avatar_url) {
              const img = document.getElementById('profileAvatar');
              img.src = data.avatar_url;
              img.style.display = 'block';
            }
            document.getElementById('rubyCount').textContent = data.rubies ?? 0;
          });
      }
    </script>
    <script src="../scripts/bg-symbols.js"></script>
  </body>
</html>
