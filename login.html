<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyPortal - Login</title>
    <link rel="stylesheet" href="./style/login/login.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="logo">
      <a href="">
        <h1>StudyP<img src="./img/portal.png" alt="" />rtal</h1>
      </a>
    </div>

    <div class="login-container">
      <h2>Login</h2>

      <form action="">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required />

        <a href="./pages/passwordReset.html">Forgot Password?</a>

        <button type="submit">Login</button>
      </form>

      <p>Don't have an account? <a href="signup.html">Sign up here</a>.</p>
    </div>

    <script src="./scripts/login.js"></script>
  </body>
</html>
